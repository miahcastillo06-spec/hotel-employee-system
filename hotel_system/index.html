<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel System - PC1 / Web Server 1</title>
<style>
    body {
        font-family: 'Times New Roman', Times, serif;
        margin: 0;
        padding: 40px;
        color: #222;
        background-image: url('img/background.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        min-height: 100vh;
    }

    .page-wrapper {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 50px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .left-panel {
    flex: 1;
    padding-top: 120px;
}

.left-panel-card {
    background: rgba(26, 25, 25, 0.35);
    backdrop-filter: blur(3px);
    border-radius: 12px;
    padding: 32px 36px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    display: inline-block;
}

.left-panel h1 {
    color: #fdfafa;
    text-shadow: none;
}

.left-panel p {
    color: #f1ebeb;
    text-shadow: none;
}

    .left-panel h1 {
        font-size: 70px;
        line-height: 1.2;
        margin: 0 0 12px;
    }

    .left-panel p {
        font-size: 20px;
        opacity: 0.9;
    }

    .right-panel {
        flex: 1;
        max-width: 600px;
    }

    .card {
        background: rgba(26, 25, 25, 0.35);
        max-width: 600px;
        margin: 0 0 24px;
        padding: 20px 24px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        backdrop-filter: blur(3px);
    }

    h1 { font-size: 20px; margin-top: 0; }

    .tag {
        display: inline-block;
        background: #000000;
        color: #fff;
        font-size: 12px;
        padding: 2px 10px;
        border-radius: 12px;
        margin-bottom: 12px;
    }

    label { display: block; font-size: 20px; font-weight: bold; margin-top: 12px; }
    input, select {
        width: 100%;
        padding: 8px 10px;
        margin-top: 4px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
    }

    button {
        margin-top: 18px;
        background: #000000;
        color: #fff;
        border: none;
        padding: 10px 18px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }
    button:hover { background: #333333; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #eee; font-size: 14px; }

    #status { margin-top: 14px; font-weight: bold; }
    .status-ok { color: #2e7d32; }
    .status-err { color: #c62828; }

    .hint { font-size: 12px; color: #555; margin-top: 16px; }
</style>
</head>
<body>

<div class="page-wrapper">

    <div class="left-panel">
    <div class="left-panel-card">
        <h1>Welcome to<br>Castello Hotel</h1>
        <p>Your comfort, our commitment.</p>
    </div>
</div>

    <div class="right-panel">

        <div class="card">
            <h1>New Reservation</h1>

            <form id="reservationForm">
                <label>Customer Name</label>
                <input type="text" id="customer_name" required>

                <label>Check In</label>
                <input type="date" id="check_in" required>

                <label>Check Out</label>
                <input type="date" id="check_out" required>

                <label>Attending Employee</label>
                <select id="employee_select" required>
                <option value="">Loading employees...</option>
                </select>

                <label>Employee ID</label>
                <input type="text" id="employee_id_display" readonly placeholder="Auto-filled after selecting employee">

            <button type="submit">Create Reservation</button>
            </form>

        <div id="status"></div>
            
        </div>


    </div>

</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
